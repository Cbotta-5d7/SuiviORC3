name: Build Windows EXE

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter openpyxl Pillow pyinstaller

      - name: Compiler l'EXE
        run: |
          python -m PyInstaller --onefile --windowed --name "SuiviProductionORC1" --noconfirm app.py

      - name: Publier l'EXE en artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuiviProductionORC1-Windows
          path: dist\SuiviProductionORC1.exe
          retention-days: 30
