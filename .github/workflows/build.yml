name: Build EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter openpyxl Pillow pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --onefile --windowed --name "SuiviProductionORC" --noconfirm app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuiviProductionORC
          path: dist/SuiviProductionORC.exe
